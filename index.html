<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Execution Curve</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

 {--black: #0A0A0A;--white: #FAFAFA;--amber: #C8873F;--amber-dim: #8A5C28;--gray-1: #6B6B6B;--gray-2: #D4D4D4;--gray-3: #F0F0F0;--display: 'Syne', sans-serif;--mono: 'DM Mono', monospace;--body: 'IBM Plex Sans', sans-serif;}

html { scroll-behavior: smooth; }

body {background: var(--white);color: var(--black);font-family: var(--body);font-size: 16px;line-height: 1.6;-webkit-font-smoothing: antialiased;}

/* NAV */nav {position: fixed;top: 0; left: 0; right: 0;z-index: 100;display: flex;align-items: center;justify-content: space-between;padding: 1.25rem 3rem;background: var(--white);border-bottom: 1px solid var(--gray-2);}

.nav-logo {font-family: var(--mono);font-weight: 500;font-size: 0.9rem;letter-spacing: -0.01em;color: var(--black);text-decoration: none;}

.nav-logo span {color: var(--amber);}

.nav-links {display: flex;gap: 2rem;list-style: none;}

.nav-links a {font-family: var(--body);font-size: 0.875rem;font-weight: 400;color: var(--gray-1);text-decoration: none;transition: color 0.2s;}

.nav-links a { color: var(--black); }

@media (max-width: 768px) {.nav-links { display: none; }}

.nav-cta {font-family: var(--body);font-size: 0.875rem;font-weight: 500;color: var(--white);background: var(--black);border: none;padding: 0.5rem 1.25rem;cursor: pointer;letter-spacing: -0.01em;transition: background 0.2s;}

.nav-cta { background: var(--amber); }

/* HERO */#hero {min-height: 100vh;display: flex;align-items: flex-end;padding: 0 3rem 5rem;padding-top: 6rem;position: relative;overflow: hidden;}

.hero-inner {max-width: 860px;}

.hero-eyebrow {font-family: var(--mono);font-size: 1rem;font-weight: 500;letter-spacing: 0.04em;color: var(--amber);margin-bottom: 2rem;opacity: 0;transform: translateY(16px);transition: opacity 0.7s ease, transform 0.7s ease;}

.hero-heading {font-family: var(--display);font-size: clamp(2.8rem, 6vw, 5.5rem);font-weight: 700;line-height: 1.0;letter-spacing: -0.04em;color: var(--black);margin-bottom: 2.5rem;opacity: 0;transform: translateY(24px);transition: opacity 0.8s ease 0.1s, transform 0.8s ease 0.1s;}

.hero-heading em {font-style: normal;color: var(--amber);}

.hero-sub {font-family: var(--body);font-size: clamp(1rem, 1.5vw, 1.2rem);font-weight: 400;color: var(--gray-1);line-height: 1.7;max-width: 520px;margin-bottom: 3rem;opacity: 0;transform: translateY(16px);transition: opacity 0.8s ease 0.2s, transform 0.8s ease 0.2s;}

.hero-actions {display: flex;align-items: center;gap: 1.5rem;opacity: 0;transform: translateY(16px);transition: opacity 0.8s ease 0.32s, transform 0.8s ease 0.32s;}

.btn-primary {font-family: var(--body);font-size: 0.95rem;font-weight: 500;color: var(--white);background: var(--black);border: none;padding: 0.85rem 2rem;cursor: pointer;letter-spacing: -0.01em;transition: background 0.2s, transform 0.15s;}

.btn-primary {background: var(--amber);transform: translateY(-1px);}

.btn-ghost {font-family: var(--body);font-size: 0.875rem;font-weight: 400;color: var(--gray-1);background: none;border: none;cursor: pointer;text-decoration: underline;text-underline-offset: 3px;transition: color 0.2s;}

.btn-ghost { color: var(--black); }

/* Large background numeral — signature element */.hero-bg-numeral {position: absolute;right: -2rem;bottom: -4rem;font-family: var(--display);font-size: clamp(14rem, 22vw, 22rem);font-weight: 700;letter-spacing: -0.06em;color: transparent;-webkit-text-stroke: 1px var(--gray-2);line-height: 1;user-select: none;pointer-events: none;opacity: 0;transition: opacity 1.2s ease 0.4s;}

/* REVEAL states */.revealed .hero-eyebrow,.revealed .hero-heading,.revealed .hero-sub,.revealed .hero-actions,.revealed .hero-bg-numeral {opacity: 1;transform: translateY(0);}

/* SCROLL HINT */.scroll-hint {position: absolute;bottom: 2rem;left: 3rem;display: flex;align-items: center;gap: 0.75rem;opacity: 0;transition: opacity 0.8s ease 0.8s;}

.revealed .scroll-hint { opacity: 1; }

.scroll-hint-line {width: 32px;height: 1px;background: var(--gray-2);}

.scroll-hint span {font-size: 0.7rem;letter-spacing: 0.1em;text-transform: uppercase;color: var(--gray-1);font-family: var(--body);}

/* STAT ROW */.hero-stats {display: flex;gap: 3rem;margin-top: 4rem;padding-top: 2rem;border-top: 1px solid var(--gray-2);opacity: 0;transform: translateY(12px);transition: opacity 0.8s ease 0.45s, transform 0.8s ease 0.45s;}

.revealed .hero-stats { opacity: 1; transform: translateY(0); }

.stat-item {}

.stat-num {font-family: var(--display);font-size: 1.6rem;font-weight: 700;letter-spacing: -0.03em;color: var(--black);display: block;}

.stat-label {font-size: 0.78rem;color: var(--gray-1);font-family: var(--body);letter-spacing: 0.01em;}

/* ---- SECTION 2: THE PROBLEM ---- */#problem {padding: 8rem 3rem;border-top: 1px solid var(--gray-2);display: grid;grid-template-columns: 1fr 1fr;gap: 6rem;align-items: center;}

.section-label {font-size: 0.7rem;letter-spacing: 0.14em;text-transform: uppercase;color: var(--amber);font-family: var(--body);font-weight: 500;margin-bottom: 1.5rem;display: block;}

.section-heading {font-family: var(--display);font-size: clamp(1.8rem, 3vw, 2.8rem);font-weight: 700;letter-spacing: -0.03em;line-height: 1.1;color: var(--black);margin-bottom: 1.5rem;}

.section-body {font-family: var(--body);font-size: 1rem;color: var(--gray-1);line-height: 1.8;}

.section-body p + p { margin-top: 1rem; }

/* Problem blocks */.problem-blocks {display: flex;flex-direction: column;gap: 0;}

.problem-block {padding: 1.75rem 0;border-bottom: 1px solid var(--gray-2);display: grid;grid-template-columns: 2.5rem 1fr;gap: 1rem;align-items: start;}

.problem-block { border-top: 1px solid var(--gray-2); }

.problem-num {font-family: var(--mono);font-size: 0.7rem;font-weight: 400;letter-spacing: 0.04em;color: var(--amber);padding-top: 0.2rem;}

.problem-text {font-family: var(--body);font-size: 0.95rem;color: var(--black);line-height: 1.6;}

.problem-text strong {font-weight: 500;display: block;margin-bottom: 0.25rem;}

.problem-text span {color: var(--gray-1);font-size: 0.875rem;}

/* SCROLL REVEAL for sections */.reveal {opacity: 0;transform: translateY(32px);transition: opacity 0.75s ease, transform 0.75s ease;}

.reveal.visible {opacity: 1;transform: translateY(0);}

.reveal-delay-1 { transition-delay: 0.1s; }.reveal-delay-2 { transition-delay: 0.2s; }.reveal-delay-3 { transition-delay: 0.3s; }.reveal-delay-4 { transition-delay: 0.4s; }

/* FOOTER placeholder */footer {padding: 3rem;border-top: 1px solid var(--gray-2);font-size: 0.8rem;color: var(--gray-1);font-family: var(--body);display: flex;justify-content: space-between;align-items: center;}

footer a {color: var(--gray-1);text-decoration: none;}

footer a { color: var(--black); }

/* ---- HOW IT WORKS SECTION ---- */#how {
